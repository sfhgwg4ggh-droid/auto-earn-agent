name: 💰 Monthly Revenue Report

on:
  schedule:
    - cron: '0 3 1 * *'   # 1st of month, 3am UTC
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    env:
      DOMAIN: ${{ vars.DOMAIN || 'zhushishunsui.cloud' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci

      - name: 🤖 Run Agent (revenue focus)
        run: node agent.js
        timeout-minutes: 10
