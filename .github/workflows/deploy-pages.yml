# 部署 GitHub Pages — 将 public/ 推送到 gh-pages 分支
name: 🚀 Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'public/**'
      - 'data/content-inventory.json'

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 🚀 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          commit_message: 'deploy: ${{ github.sha }} [skip ci]'
          user_name: 'Auto-Earn Agent'
          user_email: 'agent@autoearn.dev'
