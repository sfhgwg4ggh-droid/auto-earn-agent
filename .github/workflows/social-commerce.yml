# 📱 社交电商流水线 — 小红书 + 闲鱼 每日内容生成
# 每天 UTC 23:00 (北京时间 7:00) 生成今日发布清单
name: 📱 Social Commerce — 小红书 & 闲鱼

on:
  schedule:
    - cron: '0 23 * * *'   # 北京时间早上 7:00
  workflow_dispatch:         # 手动触发

concurrency:
  group: social-commerce
  cancel-in-progress: true

jobs:
  social-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 📱 生成社交电商内容（小红书 + 闲鱼）
        run: node modules/social/social-pipeline.js
        timeout-minutes: 3

      - name: 📤 Commit 生成的发布清单
        run: |
          git config user.name "Social Commerce Agent 📱"
          git config user.email "agent@zhushishunsui.cloud"
          git add data/social/ -f
          if git diff --cached --quiet; then
            echo "No social content changes"
          else
            git commit -m "📱 社交电商更新: 小红书+闲鱼发布清单 — $(date +%Y-%m-%d)"
            git push
            echo "✅ Social commerce content committed"
          fi

      - name: 📊 输出今日任务
        if: always()
        run: |
          echo "### 📱 今日社交电商任务" >> $GITHUB_STEP_SUMMARY
          echo "**生成时间:** $(date '+%Y-%m-%d %H:%M')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📕 **小红书**: 打开 data/social/today-checklist.json 查看完整笔记" >> $GITHUB_STEP_SUMMARY
          echo "🐟 **闲鱼**: 打开 data/social/xianyu-listings.json 查看 Listing" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 💡 复制粘贴到对应平台发布即可" >> $GITHUB_STEP_SUMMARY
