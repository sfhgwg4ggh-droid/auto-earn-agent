name: 🛒 Weekly Commerce Pipeline

on:
  schedule:
    - cron: '0 8 * * 3'   # Wednesday 8am UTC
  workflow_dispatch:

jobs:
  commerce:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL || 'https://api.deepseek.com/anthropic' }}
      DOMAIN: ${{ vars.DOMAIN || 'zhushishunsui.cloud' }}
      BASE_URL: ${{ vars.BASE_URL || 'https://zhushishunsui.cloud' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci

      - name: 🎭 Install Playwright
        run: npx playwright install chromium --with-deps

      - name: 🤖 Run Agent (commerce focus)
        run: node agent.js
        timeout-minutes: 25
