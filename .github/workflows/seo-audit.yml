name: 🔍 Weekly SEO Audit

on:
  schedule:
    - cron: '0 6 * * 1'   # Monday 6am UTC
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL || 'https://api.deepseek.com/anthropic' }}
      DOMAIN: ${{ vars.DOMAIN || 'zhushishunsui.cloud' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci

      - name: 🤖 Run Agent (SEO focus)
        run: node agent.js
        timeout-minutes: 15
